name: Update Flight Status

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: flight-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update flight status
        run: node tools/update-flight-status.mjs

      - name: Commit status data
        id: commit_status
        run: |
          if git diff --quiet -- data/flight-status.json; then
            echo "No flight status changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/flight-status.json
            git commit -m "Update flight status data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: steps.commit_status.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site
        if: steps.commit_status.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.commit_status.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
