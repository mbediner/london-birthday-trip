name: Update Flight Status

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update flight status
        run: node tools/update-flight-status.mjs

      - name: Commit status data
        run: |
          if git diff --quiet -- data/flight-status.json; then
            echo "No flight status changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flight-status.json
          git commit -m "Update flight status data"
          git push
