name: Update Flight Status

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: flight-status
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update flight status
        run: node tools/update-flight-status.mjs

      - name: Send phone push notifications
        env:
          NTFY_TOPIC: london-birthday-trip-2026-a9x4m2q7
        shell: bash
        run: |
          count=$(node -e "console.log(require('./data/flight-notifications.json').notifications.length)")
          if [ "$count" = "0" ]; then
            echo "No phone push notifications to send."
            exit 0
          fi
          node <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data/flight-notifications.json', 'utf8'));
          for (const [index, item] of data.notifications.entries()) {
            fs.writeFileSync(`notification-${index}.txt`, item.message);
            console.log(JSON.stringify(item));
          }
          NODE
          for i in $(seq 0 $((count - 1))); do
            title=$(node -e "console.log(require('./data/flight-notifications.json').notifications[$i].title)")
            priority=$(node -e "console.log(require('./data/flight-notifications.json').notifications[$i].priority)")
            tags=$(node -e "console.log(require('./data/flight-notifications.json').notifications[$i].tags)")
            curl -sS \
              -H "Title: $title" \
              -H "Priority: $priority" \
              -H "Tags: $tags" \
              --data-binary "@notification-$i.txt" \
              "https://ntfy.sh/$NTFY_TOPIC"
          done

      - name: Commit status data
        id: commit_status
        run: |
          rm -f data/flight-notifications.json notification-*.txt
          if git diff --quiet -- data/flight-status.json; then
            echo "No flight status changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/flight-status.json
            git commit -m "Update flight status data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: steps.commit_status.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site
        if: steps.commit_status.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.commit_status.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
